[pytest]
# ── Test discovery ──────────────────────────────────────────────────
testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# ── Output ──────────────────────────────────────────────────────────
addopts =
    --tb=short
    -v
    --color=yes

# ── Markers (optional, suppresses PytestUnknownMarkWarning) ─────────
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests that hit external services
